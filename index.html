<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c3aed' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M22 10v6M2 10l10-5 10 5-10 5z'/><path d='M6 12v5c3 3 9 3 12 0v-5'/></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="description" content="Study Buddy - A premium, high-performance workspace for students to track milestones, build streaks, and manage knowledge bases with deep focus timers." />
  
  <!-- SEO & Social -->
  <meta property="og:title" content="Study Buddy | Mastery Management" />
  <meta property="og:description" content="Your personal productivity ecosystem for academic success." />
  <meta property="og:type" content="website" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
  <title>Study Buddy | Dashboard</title>

  <style>
    html, body {
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    .initial-load {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 10000;
    }

    @media (prefers-color-scheme: dark) {
      .initial-load { background: #000000; }
    }

    .loader {
      width: fit-content;
      font-weight: 800;
      font-family: 'Inter', sans-serif;
      font-size: 30px;
      padding-bottom: 8px;
      color: #7c3aed;
      background: linear-gradient(#7c3aed 0 0) 0 100%/0% 3px no-repeat;
      animation: l2 2s linear infinite;
    }
    .loader:before { content: "Study Buddy..." }
    @keyframes l2 { to { background-size: 100% 3px } }
  </style>
</head>
<body class="h-full antialiased selection:bg-primary-100 selection:text-primary-900 dark:selection:bg-primary-900/30 dark:selection:text-primary-400">
  <div id="root" class="h-full">
    <div class="initial-load">
      <div class="loader"></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
